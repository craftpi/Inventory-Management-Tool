<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vereinslager Verwaltung</title>
    <style>
        /* --- VOLLFLÄCHIGER ROTER HINTERGRUND --- */
        body { 
            font-family: Arial, sans-serif; 
            /* Das exakte Trisport-Rot als kompletter Hintergrund */
            background-color: #e3000f; 
            color: #333; 
            margin: 0; 
            padding: 40px 20px; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        /* --- DIE SCHWEBENDE WEISSE APP --- */
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            /* Ein weicher, tiefer Schatten erzeugt den "Hover"-Effekt über dem Rot */
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }

        h1 { color: #2c3e50; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #3498db; color: white; }
        .btn { background-color: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; font-size: 0.95em; }
        .btn:hover { background-color: #2980b9; }
        .menge-input { width: 60px; padding: 6px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Der dunkle Hintergrund für Popups */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); 
        }

        /* Das weiße Fenster in der Mitte (Popups) */
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .modal-content h2 { margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }

        .flex-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .btn-save { background-color: #27ae60; flex: 2; }
        .btn-cancel { background-color: #e74c3c; flex: 1; }

        /* Effekte, wenn der Bearbeitungsmodus AN ist */
        .edit-active tr.item-row { cursor: pointer; transition: background-color 0.2s; }
        .edit-active tr.item-row:hover { background-color: #e8f4fd !important; }

        /* Die schicken Badges für die Gesamtmenge */
        .summen-badge { font-size: 0.85em; background: #3498db; color: white; padding: 4px 10px; border-radius: 12px; font-weight: normal; }
    </style>
</head>
<body>

<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#e3000f; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="max-width:350px; width:90%; padding:40px 30px; background:white; border-radius:12px; text-align:center; box-shadow: 0 15px 35px rgba(0,0,0,0.3);">
        <h2 style="margin-top:0; color:#2c3e50;">🔐 Lager-Zugang</h2>
        <p style="color:#666; margin-bottom: 25px;">Bitte gib das Vereins-Passwort ein.</p>
        
        <input type="password" id="login-password" placeholder="Vereins-Passwort" style="width:100%; padding:12px; margin-bottom:20px; text-align:center; font-size:1.2em; border: 1px solid #ccc; border-radius: 6px; box-sizing:border-box;">
        
        <button class="btn" onclick="handleLogin()" style="width:100%; padding:12px; font-size:1.1em;">🔓 Entsperren</button>
        <p id="login-error" style="color:red; display:none; margin-top:15px; font-weight:bold;">Falsches Passwort!</p>
    </div>
</div>

<div class="container">
    <h1>📦 Vereinslager</h1>
    <p style="color: #666; margin-bottom: 25px;">Aktuelle Bestandsübersicht über alle Kisten und Regale. Bitte achtet auf eine saubere Sortierung nach den Veranstaltungen!</p>
    
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <div>
            <button class="btn" style="padding: 10px 20px;" onclick="openModal()">+ Neuer Artikel</button>
            <button class="btn" id="btn-edit-mode" style="background-color: #f39c12; margin-left: 10px; padding: 10px 20px;" onclick="toggleEditMode()">✏️ Bearbeiten: AUS</button>
            <select id="kategorie-filter" class="btn" style="background-color: #34495e; margin-left: 10px; padding: 10px; color: white; cursor: pointer; border: none;" onchange="wendeFilterAn()">
                <option value="ALLE">Alle Kategorien anzeigen</option>
            </select>
        </div>
        <button class="btn" style="background-color: #e74c3c; padding: 10px 20px;" onclick="handleLogout()">🔒 Abmelden</button>
    </div>

    <div id="artikelModal" class="modal">
        <div class="modal-content">
            <h2>Neuer Artikel</h2>
            <div class="form-group"><label>Name</label><input type="text" id="new-name" placeholder="z.B. Einmalhandschuhe Weiß"></div>
            <div class="form-group"><label>Kategorie</label><input type="text" id="new-kategorie" placeholder="z.B. Verpflegung"></div>
            <div class="form-group"><label>Gruppe</label><input type="text" id="new-gruppe" placeholder="z.B. Einmalhandschuhe"></div>
            <div class="form-group"><label>Lagerort</label><select id="new-ort"></select></div>
            <div class="form-group"><label>Start-Menge</label><input type="number" id="new-menge" value="0"></div>
            <div class="flex-buttons">
                <button class="btn btn-save" onclick="artikelAnlegen()">Speichern</button>
                <button class="btn btn-cancel" onclick="closeModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Artikel bearbeiten</h2>
            <input type="hidden" id="edit-bestand-id">
            <input type="hidden" id="edit-artikel-id">
            <div class="form-group"><label>Name</label><input type="text" id="edit-name"></div>
            <div class="form-group"><label>Kategorie</label><input type="text" id="edit-kategorie"></div>
            <div class="form-group"><label>Gruppe</label><input type="text" id="edit-gruppe"></div>
            <div class="form-group"><label>Lagerort</label><select id="edit-ort"></select></div>
            <div class="form-group"><label>Menge</label><input type="number" id="edit-menge"></div>
            <div class="flex-buttons">
                <button class="btn btn-save" onclick="speichereBearbeitung()">Speichern</button>
                <button class="btn btn-cancel" onclick="closeEditModal()">Abbrechen</button>
            </div>
            <button class="btn" style="background-color: #c0392b; width: 100%; margin-top: 10px;" onclick="artikelLoeschen()">🗑️ Eintrag löschen</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Artikel</th>
                <th>Lagerort</th>
                <th>Menge</th>
            </tr>
        </thead>
        <tbody id="lager-tabelle">
            <tr><td colspan="4" style="text-align: center; padding: 30px;">Lade Daten aus dem Lager...</td></tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
